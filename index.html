<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITSM Service Desk — Jira</title>
  <style>
    :root {
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --bg: #f4f5f7; --card: #fff; --text: #172b4d; --sub: #5e6c84;
      --border: #dfe1e6; --blue: #0052cc; --green: #00875a; --red: #de350b;
      --sidebar-bg: #172b4d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-ui); background: var(--bg); color: var(--text); }
    .top-nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; }
    .jira-logo { font-weight: 700; font-size: 18px; color: var(--blue); }
    .app { display: flex; min-height: calc(100vh - 48px); }
    .sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; }
    .sidebar-title { padding: 8px 20px; font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; padding: 8px 20px; cursor: pointer; gap: 12px; color: var(--text); }
    .nav-item:hover { background: var(--bg); }
    .nav-item.active { background: #e6f0ff; color: var(--blue); border-left: 3px solid var(--blue); }
    .nav-badge { margin-left: auto; background: var(--red); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
    .main { flex: 1; margin-left: 240px; padding: 24px 32px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    .btn { padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-success { background: var(--green); color: white; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: white; }
    .tab.active { background: var(--blue); color: white; border-color: var(--blue); }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .status-badge { padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
    .status-badge.open { background: #deebff; color: var(--blue); }
    .status-badge.resolved { background: #e3fcef; color: var(--green); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 24px; border-radius: 8px; width: 90%; max-width: 600px; }
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="jira-logo">Jira</div>
    <div style="width: 32px; height: 32px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">R</div>
  </div>
  
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-title">ITSM Service Desk</div>
      <div class="nav-item active"><span>📋</span><span>Queues</span></div>
      <div class="nav-item"><span>🎫</span><span>Service requests</span></div>
      <div class="nav-item"><span>⚠</span><span>Incidents</span><span class="nav-badge" id="badge">0</span></div>
      <div class="nav-item"><span>⚡</span><span>Problems</span></div>
      <div class="nav-item"><span>🔄</span><span>Changes</span></div>
    </div>
    
    <div class="main">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 class="page-title">All tickets</h1>
        <button class="btn btn-primary" onclick="rnew()">+ Create</button>
      </div>
      
      <div class="filter-tabs">
        <div class="tab active" onclick="filterTickets('all',this)">All tickets</div>
        <div class="tab" onclick="filterTickets('waiting',this)">Waiting for support</div>
        <div class="tab" onclick="filterTickets('progress',this)">In progress</div>
        <div class="tab" onclick="filterTickets('pending',this)">Pending</div>
        <div class="tab" onclick="filterTickets('resolved',this)">Resolved</div>
      </div>
      
      <div style="background: white; border: 1px solid var(--border); border-radius: 4px;">
        <table>
          <thead>
            <tr><th>Request Type</th><th>Key</th><th>Summary</th><th>Reporter</th><th>Assignee</th><th>Status</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody id="ticket-list"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modal-title" style="margin-bottom: 16px;"></h2>
      <div id="modal-body"></div>
      <div style="margin-top: 24px; text-align: right;">
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const AB = 'app6eSVRvm1wMFMq9';
    const ATB = 'Tickets';
    const AT = 'patHOTRCTuWSucNjg.patHOTRCTuWSucNjg.e2a05150bdee1f86f835ba8432f64663e20e582afacb42667330bec4632c5813';
    let tickets = [];
    
    window.onload = fetchAT;
    
    async function fetchAT() {
      try {
        const resp = await fetch(`https://api.airtable.com/v0/${AB}/${ATB}`, {
          headers: { 'Authorization': `Bearer ${AT}` }
        });
        const data = await resp.json();
        
        tickets = data.records.map(rec => {
          const f = rec.fields;
          const s = (f.Status || '').toLowerCase();
          let status = 'open';
          if (s.includes('resolv') || s.includes('done')) status = 'resolved';
          
          return {
            id: f.TicketsID || 'UNK',
            aid: rec.id,
            title: f.Title || 'Untitled',
            status: status,
            created: f.Submitted || '',
            reporter: f.Name || 'Unknown'
          };
        });
        
        updateStats();
        rlist();
      } catch (e) {
        console.error('Error:', e);
      }
    }
    
    function updateStats() {
      const open = tickets.filter(t => t.status === 'open').length;
      document.getElementById('badge').textContent = open;
    }
    
    function rlist() {
      const tbody = document.getElementById('ticket-list');
      if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 60px 20px; color: var(--sub);"><div style="font-size: 48px; margin-bottom: 16px;">🎫</div><div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">No tickets yet</div><div>Tickets raised by users will appear here</div></td></tr>';
        return;
      }
      
      tbody.innerHTML = tickets.map(t => `
        <tr onclick="showDetail('${t.id}')">
          <td>Incident</td>
          <td style="color: var(--blue); font-weight: 600;">${t.id}</td>
          <td>${t.title}</td>
          <td>${t.reporter}</td>
          <td>Unassigned</td>
          <td><span class="status-badge ${t.status}">${t.status.toUpperCase()}</span></td>
          <td>${t.created}</td>
          <td>${t.status !== 'resolved' ? `<button class="btn btn-success" onclick="event.stopPropagation(); resolveTicket('${t.id}', '${t.aid}')" style="font-size: 12px; padding: 4px 12px;">✓ Resolve</button>` : '✓ Done'}</td>
        </tr>
      `).join('');
    }
    
    function filterTickets(filter, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      // In a real app, you'd filter here
      rlist();
    }
    
    async function resolveTicket(id, aid) {
      if (!confirm('Mark ticket ' + id + ' as resolved?')) return;
      
      const ticket = tickets.find(t => t.id === id);
      if (!ticket) return;
      
      ticket.status = 'resolved';
      updateStats();
      rlist();
      
      try {
        const url = `https://api.airtable.com/v0/${AB}/${ATB}/${aid}`;
        const response = await fetch(url, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${AT}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields: { Status: 'Resolved' } })
        });
        
        if (!response.ok) {
          const error = await response.json();
          console.error('Airtable error:', error);
          alert('Failed to save: ' + (error.error?.message || response.statusText));
          ticket.status = 'open';
          updateStats();
          rlist();
        } else {
          alert('✓ Ticket resolved!');
        }
      } catch (e) {
        console.error('Error:', e);
        alert('Network error');
        ticket.status = 'open';
        updateStats();
        rlist();
      }
    }
    
    function showDetail(id) {
      const t = tickets.find(x => x.id === id);
      if (!t) return;
      
      document.getElementById('modal-title').textContent = t.id;
      document.getElementById('modal-body').innerHTML = `
        <p><strong>Title:</strong> ${t.title}</p>
        <p><strong>Status:</strong> ${t.status}</p>
        <p><strong>Reporter:</strong> ${t.reporter}</p>
        ${t.status !== 'resolved' ? `<button class="btn btn-success" style="margin-top: 16px;" onclick="resolveTicket('${t.id}', '${t.aid}'); closeModal();">✓ Resolve Ticket</button>` : ''}
      `;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    function rnew() {
      alert('Use raise-ticket.html to create new tickets');
    }
  </script>
</body>
</html>
