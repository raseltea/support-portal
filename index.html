<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge Platform — Atlassian</title>
  <style>
    :root {
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --bg: #f4f5f7; --card: #fff; --text: #172b4d; --sub: #5e6c84;
      --border: #dfe1e6; --blue: #0052cc; --green: #00875a; --amber: #ff991f;
      --red: #de350b; --sidebar-bg: #172b4d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-ui); background: var(--bg); color: var(--text); }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; }
    .main { flex: 1; margin-left: 240px; padding: 32px; }
    .btn { padding: 8px 16px; background: var(--blue); color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #0747a6; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    tr:hover { background: var(--bg); cursor: pointer; }
    .status-badge { padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
    .status-badge.open { background: #deebff; color: #0052cc; }
    .status-badge.resolved { background: #e3fcef; color: #006644; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 24px; border-radius: 8px; width: 90%; max-width: 600px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div style="padding: 20px;">
        <h1>Edge Platform</h1>
        <div style="font-size: 11px; opacity: 0.6;">atlassian.com</div>
      </div>
      <div style="padding: 16px 20px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1);">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div style="width: 32px; height: 32px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center;">YO</div>
          <div>
            <div style="font-weight: 600; font-size: 13px;">You</div>
            <div style="font-size: 11px; opacity: 0.6;">Manage account</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="main">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 style="font-size: 28px; font-weight: 700;">My Tickets</h1>
        <button class="btn" onclick="rnew()">+ Raise ticket</button>
      </div>
      
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;">
        <div style="background: white; padding: 20px; border: 1px solid var(--border); border-radius: 6px;">
          <div style="font-size: 32px; font-weight: 700; color: var(--blue);" id="stat-open">0</div>
          <div style="color: var(--sub); font-size: 13px;">Open</div>
        </div>
        <div style="background: white; padding: 20px; border: 1px solid var(--border); border-radius: 6px;">
          <div style="font-size: 32px; font-weight: 700; color: var(--green);" id="stat-resolved">0</div>
          <div style="color: var(--sub); font-size: 13px;">Resolved</div>
        </div>
        <div style="background: white; padding: 20px; border: 1px solid var(--border); border-radius: 6px;">
          <div style="font-size: 32px; font-weight: 700;" id="stat-total">0</div>
          <div style="color: var(--sub); font-size: 13px;">Total</div>
        </div>
      </div>
      
      <div style="background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;">
        <table>
          <thead>
            <tr>
              <th>KEY</th>
              <th>SUMMARY</th>
              <th>STATUS</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody id="ticket-list"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modal-title" style="margin-bottom: 16px;"></h2>
      <div id="modal-body"></div>
      <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const AB = 'app6eSVRvm1wMFMq9';
    const ATB = 'Tickets';
    const AT = 'patHOTRCTuWSucNjg.patHOTRCTuWSucNjg.e2a05150bdee1f86f835ba8432f64663e20e582afacb42667330bec4632c5813';
    let tickets = [];
    
    window.onload = fetchAT;
    
    async function fetchAT() {
      try {
        const resp = await fetch(`https://api.airtable.com/v0/${AB}/${ATB}`, {
          headers: { 'Authorization': `Bearer ${AT}` }
        });
        const data = await resp.json();
        
        tickets = data.records.map(rec => {
          const f = rec.fields;
          const statusLower = (f.Status || '').toLowerCase();
          let status = 'open';
          if (statusLower.includes('resolv') || statusLower.includes('done')) status = 'resolved';
          
          return {
            id: f.TicketsID || 'UNK',
            aid: rec.id,
            title: f.Title || 'Untitled',
            status: status
          };
        });
        
        updateStats();
        rlist();
      } catch (e) {
        console.error('Fetch error:', e);
      }
    }
    
    function updateStats() {
      const open = tickets.filter(t => t.status === 'open').length;
      const resolved = tickets.filter(t => t.status === 'resolved').length;
      document.getElementById('stat-open').textContent = open;
      document.getElementById('stat-resolved').textContent = resolved;
      document.getElementById('stat-total').textContent = tickets.length;
    }
    
    function rlist() {
      const tbody = document.getElementById('ticket-list');
      if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">No tickets</td></tr>';
        return;
      }
      
      tbody.innerHTML = tickets.map(t => `
        <tr onclick="showDetail('${t.id}')">
          <td style="color: var(--blue); font-weight: 600;">${t.id}</td>
          <td>${t.title}</td>
          <td><span class="status-badge ${t.status}">${t.status.toUpperCase()}</span></td>
          <td>${t.status !== 'resolved' ? `<button class="btn" style="background: var(--green);" onclick="event.stopPropagation(); resolveTicket('${t.id}', '${t.aid}')">✓ Resolve</button>` : '✓ Done'}</td>
        </tr>
      `).join('');
    }
    
    async function resolveTicket(id, aid) {
      if (!confirm('Mark ticket ' + id + ' as resolved?')) return;
      
      const ticket = tickets.find(t => t.id === id);
      if (!ticket) return;
      
      // Update UI immediately
      ticket.status = 'resolved';
      updateStats();
      rlist();
      
      // Save to Airtable - MUST match your Single Select option EXACTLY
      try {
        const url = `https://api.airtable.com/v0/${AB}/${ATB}/${aid}`;
        const response = await fetch(url, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${AT}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fields: { Status: 'Resolved' }
          })
        });
        
        if (!response.ok) {
          const error = await response.json();
          console.error('Airtable error:', error);
          alert('Failed to save: ' + (error.error?.message || response.statusText));
          // Revert on error
          ticket.status = 'open';
          updateStats();
          rlist();
        } else {
          console.log('✅ Ticket resolved and saved to Airtable!');
          alert('✓ Ticket ' + id + ' resolved!');
        }
      } catch (e) {
        console.error('Network error:', e);
        alert('Network error');
        ticket.status = 'open';
        updateStats();
        rlist();
      }
    }
    
    function showDetail(id) {
      const t = tickets.find(x => x.id === id);
      if (!t) return;
      
      document.getElementById('modal-title').textContent = t.id;
      document.getElementById('modal-body').innerHTML = `
        <p><strong>Title:</strong> ${t.title}</p>
        <p><strong>Status:</strong> ${t.status}</p>
        ${t.status !== 'resolved' ? `<button class="btn" style="background: var(--green); margin-top: 16px;" onclick="resolveTicket('${t.id}', '${t.aid}'); closeModal();">✓ Resolve Ticket</button>` : ''}
      `;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    function rnew() {
      alert('Create ticket feature - use your existing form');
    }
  </script>
</body>
</html>
